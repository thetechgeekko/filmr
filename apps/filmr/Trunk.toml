[build]
filehash = false
# Exclude depth for WASM (ureq/ring doesn't support wasm32)
features = ["cli", "ui", "compute-gpu"]
no_default_features = true

[[hooks]]
stage = "post_build"
command = "python3"
command_arguments = ["patch_dist.py"]

[serve]
headers = { "Cross-Origin-Opener-Policy" = "same-origin", "Cross-Origin-Embedder-Policy" = "require-corp" }
