name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  check-and-test:
    name: Check, test, and cross-compile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Cache cargo registry, git, and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo check (android feature)
        run: cargo check --features android

      - name: cargo check (android,depth features)
        run: cargo check --features android,depth

      - name: cargo test
        run: cargo test

      - name: Security audit
        run: |
          cargo install cargo-audit --locked 2>/dev/null || true
          cargo audit

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Install Android NDK r25c
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c
          add-to-path: false

      - name: Cross-compile for arm64-v8a (primary ABI smoke test)
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: cargo ndk -t arm64-v8a build --release --features android
